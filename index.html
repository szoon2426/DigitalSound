<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>산스장</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="introScreen" class="intro-screen" aria-label="산스장 시작">
        <div class="intro-inner">
          <p class="kicker">Sound Gym in the Mountain</p>
          <h1>산스장</h1>

          <label class="target-field" for="targetRepsInput">
            <span>목표 횟수</span>
            <input id="targetRepsInput" type="number" min="1" max="30" value="8" />
          </label>

          <button id="startButton" class="primary-button" type="button">운동 시작</button>
        </div>
      </section>

      <section id="workoutScreen" class="workout-screen" aria-label="산스장 운동 화면" hidden>
        <div class="camera-wrap">
          <video id="camera" playsinline muted></video>
          <canvas id="overlay"></canvas>
          <div class="scan-line" aria-hidden="true"></div>
          <div class="status-pill" id="presenceStatus">숲 대기</div>
          <div class="debug-hud" id="debugHud">phase idle | depth 0.00 | reps 0</div>
          <button id="endButton" class="end-button" type="button">운동 종료</button>
        </div>
      </section>
    </main>

    <output id="phaseText" hidden>산 사운드</output>
    <output id="repCount" hidden>0</output>
    <output id="depthScore" hidden>65%</output>
    <output id="layerCount" hidden>1</output>
    <output id="goalProgress" hidden>0%</output>

    <script type="module" src="./app.js"></script>
  </body>
</html>
